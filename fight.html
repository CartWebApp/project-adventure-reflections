<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Screen</title>
    <link rel="stylesheet" href="fight.css">
</head>
<audio id="battleMusic" src="Assets/Music/THE WORLD REVOLVING 4.mp3" autoplay loop></audio>
<body>
    <main class="fight-screen">
        <section class="battlefield">
            <section class="battle-panel">
                <p class="turn-label" id="turnLabel">Turn 1 - Your move</p>
                <p class="battle-message" id="battleMessage">Shadow Sadie steps in. Pick a command.</p>
                <div class="battle-log" id="battleLog"></div>
            </section>

            <div class="combatant leader" id="combatant-sadie">
                <div class="combatant-card">
                    <div class="combatant-header">
                        <span class="combatant-name">Sadie</span>
                        <span class="combatant-hp" id="hp-sadie">32 / 32</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill" id="bar-sadie"></div>
                    </div>
                </div>
                <img src="Assets/Dialouge/mom/happyo.png" alt="Sadie">
            </div>

            <div class="combatant hero" id="combatant-akira">
                <div class="combatant-card">
                    <div class="combatant-header">
                        <span class="combatant-name">Akira</span>
                        <span class="combatant-hp" id="hp-akira">44 / 44</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill" id="bar-akira"></div>
                    </div>
                </div>
                <img src="Assets/Dialouge/mom/happyo.png" alt="Akira">
            </div>

            <div class="combatant ally" id="combatant-momo">
                <div class="combatant-card">
                    <div class="combatant-header">
                        <span class="combatant-name">Momo</span>
                        <span class="combatant-hp" id="hp-momo">28 / 28</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill" id="bar-momo"></div>
                    </div>
                </div>
                <img src="Assets/Dialouge/mom/happyo.png" alt="Momo">
            </div>

            <div class="combatant boss" id="combatant-enemy">
                <div class="combatant-card enemy-card">
                    <div class="combatant-header">
                        <span class="combatant-name" id="enemyName">Shadow Sadie</span>
                        <span class="combatant-hp" id="hp-enemy">670 / 670</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill enemy-fill" id="bar-enemy"></div>
                    </div>
                    <p class="enemy-intent" id="enemyIntent">Intent: Sharp strike for 8-14 damage</p>
                </div>
                <img src="Assets/Dialouge/mom/happyo.png" alt="Enemy">
            </div>
        </section>

        <div class="battle-toolbar">
            <button class="secondary-btn" type="button" id="restartButton">Restart Demo</button>
            <div class="mercy-meter">Mercy <span id="mercyValue">0%</span></div>
        </div>

        <section class="menu-stack">
            <div class="battle-box">
                <img src="Assets/Battle/box.png" alt="" class="battle-box-image">
                <div class="battle-box-content">
                    <p class="menu-caption" id="menuCaption">Choose a command for the party.</p>
                    <nav class="battle-menu" aria-label="Battle options">
                        <button class="battle-btn" type="button" data-menu="fight">Fight</button>
                        <button class="battle-btn" type="button" data-menu="inventory">Inventory</button>
                        <button class="battle-btn" type="button" data-menu="act">Act</button>
                        <button class="battle-btn" type="button" data-menu="spare">Spare</button>
                    </nav>
                </div>
            </div>

            <div class="battle-box overlay hidden" id="overlay">
                <img src="Assets/Battle/box.png" alt="" class="battle-box-image">
                <div class="battle-box-content">
                    <div class="overlay-header">
                        <p class="overlay-title" id="overlayTitle">Choose an action</p>
                        <button class="overlay-close" type="button" id="closeOverlayButton">Back</button>
                    </div>
                    <div class="overlay-content" id="overlayContent"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="fight.js"></script>
</body>

</html>
